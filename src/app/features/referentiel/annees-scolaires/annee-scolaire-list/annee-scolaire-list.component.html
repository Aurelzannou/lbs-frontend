<div class="page-wrapper" [class.loading]="loading">

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        class="search-input"
        placeholder="Rechercher une année scolaire..."
        (input)="onSearchChange($event)"
        #searchInput
      />
    </div>

    <div class="toolbar-actions">
      <button class="btn-refresh" (click)="refresh()" title="Actualiser">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Actualiser
      </button>

      <button class="btn-add" (click)="openForm()">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Nouvelle Année
      </button>
    </div>
  </div>

  <!-- ===== TABLE CARD ===== -->
  <div class="table-card">
    <div class="spinner-overlay" *ngIf="loading">
      <div class="spinner"></div>
    </div>

    <div class="table-wrapper">
      <table class="data-table" mat-table [dataSource]="dataSource" matSort>

        <!-- Code Column -->
        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge-code">{{ row.code }}</span>
          </td>
        </ng-container>

        <!-- Libelle Column -->
        <ng-container matColumnDef="libelle">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Libellé</th>
          <td mat-cell *matCellDef="let row">
            <span class="text-main">{{ row.libelle }}</span>
          </td>
        </ng-container>

        <!-- Date Debut Column -->
        <ng-container matColumnDef="dateDebut">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date Début</th>
          <td mat-cell *matCellDef="let row">
            {{ row.dateDebut | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <!-- Date Fin Column -->
        <ng-container matColumnDef="dateFin">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Date Fin</th>
          <td mat-cell *matCellDef="let row">
            {{ row.dateFin | date:'dd/MM/yyyy' }}
          </td>
        </ng-container>

        <!-- Actif Column -->
        <ng-container matColumnDef="actif">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Statut</th>
          <td mat-cell *matCellDef="let row">
            <span [class]="'badge-status ' + (row.actif ? 'active' : 'inactive')">
              {{ row.actif ? 'Actif' : 'Inactif' }}
            </span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Opérations</th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <div class="action-group">
              <button class="icon-btn edit" (click)="openForm(row)" title="Modifier">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="icon-btn delete" (click)="deleteAnneeScolaire(row)" title="Supprimer">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                </svg>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row" [@rowsAnimation]></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
            <div class="empty-state" *ngIf="!loading">
              <p>Aucune année scolaire trouvée</p>
            </div>
          </td>
        </tr>
      </table>
    </div>

    <div class="table-footer">
      <span class="pagination-info">
        Total: <strong>{{ totalElements }}</strong>
      </span>
      <div class="pagination-nav">
        <button class="nav-arrow" (click)="prevPage()" [disabled]="pageIndex === 0">Précédent</button>
        <button class="nav-arrow" (click)="nextPage()" [disabled]="(pageIndex + 1) * pageSize >= totalElements">Suivant</button>
      </div>
    </div>
  </div>

  <mat-paginator [pageSize]="pageSize" [length]="totalElements" style="display:none"></mat-paginator>
</div>
