<div class="dialog-container">
  <div class="dialog-header">
    <h3>{{ isEdit ? 'Modifier la Classe' : 'Nouvelle Classe' }}</h3>
    <button class="close-btn" (click)="onCancel()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-content">
    <div class="form-grid">
      <!-- Code -->
      <div class="form-field">
        <label>Code de la classe</label>
        <input nbInput fullWidth placeholder="Ex: 6EME-A" formControlName="code" 
               [status]="form.get('code')?.invalid && form.get('code')?.touched ? 'danger' : 'basic'">
        <span class="error-text" *ngIf="form.get('code')?.invalid && form.get('code')?.touched">
          Le code est obligatoire
        </span>
      </div>

      <!-- Libellé -->
      <div class="form-field">
        <label>Libellé complet</label>
        <input nbInput fullWidth placeholder="Ex: Sixième A" formControlName="libelle"
               [status]="form.get('libelle')?.invalid && form.get('libelle')?.touched ? 'danger' : 'basic'">
      </div>

      <!-- Niveau -->
      <div class="form-field">
        <label>Niveau scolaire</label>
        <ng-select
          [items]="niveaux"
          bindLabel="libelle"
          bindValue="id"
          formControlName="niveauId"
          placeholder="Sélectionner un niveau"
          class="custom-ng-select"
          [loading]="loading">
        </ng-select>
        <span class="error-text" *ngIf="form.get('niveauId')?.invalid && form.get('niveauId')?.touched">
          Le niveau est obligatoire
        </span>
      </div>
    </div>
  </form>

  <div class="dialog-footer">
    <button nbButton ghost status="basic" (click)="onCancel()" [disabled]="saving">Annuler</button>
    <button nbButton status="primary" (click)="onSubmit()" [disabled]="form.invalid || saving || loading" [nbSpinner]="saving">
      {{ isEdit ? 'Enregistrer' : 'Créer la classe' }}
    </button>
  </div>
</div>
