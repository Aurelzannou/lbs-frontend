<div class="dialog-container">
  <div class="dialog-header">
    <h3>{{ isEdit ? 'Modifier la Période' : 'Nouvelle Période' }}</h3>
    <button class="close-btn" (click)="onCancel()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-content">
    <div class="form-grid">
      <!-- Code -->
      <div class="form-field">
        <label>Code</label>
        <input nbInput fullWidth placeholder="Ex: TRIM1" formControlName="code" 
               [status]="form.get('code')?.invalid && form.get('code')?.touched ? 'danger' : 'basic'">
      </div>

      <!-- Libellé -->
      <div class="form-field">
        <label>Libellé</label>
        <input nbInput fullWidth placeholder="Ex: Premier Trimestre" formControlName="libelle"
               [status]="form.get('libelle')?.invalid && form.get('libelle')?.touched ? 'danger' : 'basic'">
      </div>

      <!-- Dates -->
      <div class="form-row">
        <div class="form-field">
          <label>Date Début</label>
          <input nbInput fullWidth [nbDatepicker]="pickerDebut" formControlName="dateDebut" placeholder="jj/mm/aaaa">
          <nb-datepicker #pickerDebut></nb-datepicker>
        </div>
        <div class="form-field">
          <label>Date Fin</label>
          <input nbInput fullWidth [nbDatepicker]="pickerFin" formControlName="dateFin" placeholder="jj/mm/aaaa">
          <nb-datepicker #pickerFin></nb-datepicker>
        </div>
      </div>
    </div>
  </form>

  <div class="dialog-footer">
    <button nbButton ghost status="basic" (click)="onCancel()" [disabled]="saving">Annuler</button>
    <button nbButton status="primary" (click)="onSubmit()" [disabled]="form.invalid || saving" [nbSpinner]="saving">
      {{ isEdit ? 'Enregistrer' : 'Créer la période' }}
    </button>
  </div>
</div>
