<div class="dialog-wrapper">
  <div class="glass-overlay"></div>
  
  <nb-card class="form-card">
    <nb-card-header class="form-header">
      <div class="header-content">
        <div class="title-with-icon">
          <div class="icon-box" [ngClass]="isEdit ? 'edit-mode' : 'create-mode'">
            <nb-icon [icon]="isEdit ? 'edit-2-outline' : 'plus-outline'"></nb-icon>
          </div>
          <div class="title-text">
            <h3>{{ isEdit ? 'Modifier l\'' : 'Nouvelle' }} Étape</h3>
            <p class="subtitle">{{ isEdit ? 'Mise à jour des informations' : 'Définition d\'une nouvelle étape administrative' }}</p>
          </div>
        </div>
        <button nbButton ghost status="basic" (click)="onCancel()" class="close-btn">
          <nb-icon icon="close-outline"></nb-icon>
        </button>
      </div>
    </nb-card-header>

    <nb-card-body class="form-body">
      <form [formGroup]="form" class="professional-form">
        <div class="form-row">
          <div class="form-field full-width">
            <label class="field-label">Code de l'étape</label>
            <nb-form-field>
              <nb-icon nbPrefix icon="hash-outline" pack="eva"></nb-icon>
              <input nbInput 
                     fullWidth 
                     shape="semi-round" 
                     formControlName="code" 
                     placeholder="Ex: INSCRIPTION, VALIDATION..."
                     style="text-transform: uppercase"
                     [status]="form.get('code')?.invalid && form.get('code')?.touched ? 'danger' : 'primary'">
            </nb-form-field>
            <div class="field-error" *ngIf="form.get('code')?.invalid && form.get('code')?.touched">
              <span *ngIf="form.get('code')?.errors?.['required']">Ce champ est obligatoire</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field full-width">
            <label class="field-label">Libellé</label>
            <nb-form-field>
              <nb-icon nbPrefix icon="text-outline" pack="eva"></nb-icon>
              <input nbInput 
                     fullWidth 
                     shape="semi-round" 
                     formControlName="libelle" 
                     placeholder="Ex: Inscription des élèves"
                     [status]="form.get('libelle')?.invalid && form.get('libelle')?.touched ? 'danger' : 'primary'">
            </nb-form-field>
            <div class="field-error" *ngIf="form.get('libelle')?.invalid && form.get('libelle')?.touched">
              <span *ngIf="form.get('libelle')?.errors?.['required']">Ce champ est obligatoire</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field full-width">
            <label class="field-label">Description (optionnel)</label>
            <textarea nbInput 
                      fullWidth 
                      shape="semi-round" 
                      formControlName="description" 
                      placeholder="Détails sur cette étape..."
                      rows="3"
                      [status]="'primary'">
            </textarea>
          </div>
        </div>
      </form>
    </nb-card-body>

    <nb-card-footer class="form-footer">
      <div class="footer-actions">
        <button nbButton 
                status="basic" 
                appearance="ghost"
                (click)="onCancel()" 
                [disabled]="loading"
                class="cancel-btn">
          Annuler
        </button>
        <button nbButton 
                status="primary" 
                shape="semi-round"
                (click)="onSubmit()" 
                [disabled]="form.invalid || loading" 
                [nbSpinner]="loading" 
                nbSpinnerStatus="control"
                class="submit-btn shadow-btn">
          <nb-icon icon="save-outline" *ngIf="!loading"></nb-icon>
          {{ isEdit ? 'Mettre à jour' : 'Enregistrer' }}
        </button>
      </div>
    </nb-card-footer>
  </nb-card>
</div>
