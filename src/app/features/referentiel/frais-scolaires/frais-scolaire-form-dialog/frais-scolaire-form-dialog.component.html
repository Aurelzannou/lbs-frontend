<div class="dialog-container">
  <div class="dialog-header">
    <h3>{{ isEdit ? 'Modifier les Frais' : 'Nouveau Frais' }}</h3>
    <button class="close-btn" (click)="onCancel()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-content">
    <div class="form-grid">
      <!-- Classe -->
      <div class="form-field">
        <label>Classe concernée</label>
        <ng-select
          [items]="classes"
          bindLabel="libelle"
          bindValue="id"
          formControlName="classeId"
          placeholder="Sélectionner une classe"
          class="custom-ng-select"
          [loading]="loading">
        </ng-select>
      </div>

      <!-- Libellé -->
      <div class="form-field">
        <label>Libellé des frais</label>
        <input nbInput fullWidth placeholder="Ex: Scolarité, Inscription..." formControlName="libelle"
               [status]="form.get('libelle')?.invalid && form.get('libelle')?.touched ? 'danger' : 'basic'">
      </div>

      <!-- Montant -->
      <div class="form-field">
        <label>Montant (FCFA)</label>
        <input nbInput fullWidth type="number" placeholder="0" formControlName="montant"
               [status]="form.get('montant')?.invalid && form.get('montant')?.touched ? 'danger' : 'basic'">
      </div>
    </div>
  </form>

  <div class="dialog-footer">
    <button nbButton ghost status="basic" (click)="onCancel()" [disabled]="saving">Annuler</button>
    <button nbButton status="primary" (click)="onSubmit()" [disabled]="form.invalid || saving || loading" [nbSpinner]="saving">
      {{ isEdit ? 'Enregistrer' : 'Créer les frais' }}
    </button>
  </div>
</div>
