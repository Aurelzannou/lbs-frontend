<div class="page-wrapper" [class.loading]="loading">

  <!-- ===== TOOLBAR ===== -->
  <div class="toolbar">
    <!-- Recherche -->
    <div class="search-box">
      <span class="search-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input
        class="search-input"
        placeholder="Rechercher des utilisateurs..."
        (input)="onSearchChange($event)"
        #searchInput
      />
    </div>

    <!-- Boutons droite -->
    <div class="toolbar-actions">
      <button class="btn-refresh" (click)="refresh()" title="Actualiser">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Actualiser
      </button>

      <!-- Pas de bouton "Nouveau" ici car les utilisateurs sont créés via Keycloak ou Inscription -->
    </div>
  </div>

  <!-- ===== TABLE CARD ===== -->
  <div class="table-card">

    <!-- Spinner overlay -->
    <div class="spinner-overlay" *ngIf="loading">
      <div class="spinner"></div>
    </div>

    <div class="table-wrapper">
      <table class="data-table" mat-table [dataSource]="dataSource" matSort>

        <!-- User Column -->
        <ng-container matColumnDef="user">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Utilisateur</th>
          <td mat-cell *matCellDef="let row">
            <div class="user-info-cell">
              <nb-user [name]="row.prenom + ' ' + row.nom" 
                       [title]="row.email"
                       size="medium"
                       [onlyPicture]="false">
              </nb-user>
            </div>
          </td>
        </ng-container>

        <!-- Login Column -->
        <ng-container matColumnDef="login">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom d'utilisateur</th>
          <td mat-cell *matCellDef="let row">
            <span class="badge-login">{{ row.username }}</span>
          </td>
        </ng-container>

        <!-- Keycloak Column -->
        <ng-container matColumnDef="keycloak">
          <th mat-header-cell *matHeaderCellDef>Statut Profils</th>
          <td mat-cell *matCellDef="let row">
            <div class="profils-badges">
              <span class="badge-profil" *ngFor="let p of row.profils">{{ p }}</span>
              <span class="text-muted" *ngIf="!row.profils || row.profils.length === 0">Aucun profil</span>
            </div>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="col-actions">Opérations</th>
          <td mat-cell *matCellDef="let row" class="col-actions">
            <div class="action-group">
              <!-- Éditer Profils -->
              <button class="icon-btn edit" (click)="assignProfils(row)" title="Assigner des profils">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/>
                </svg>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row" [@rowsAnimation]></tr>

        <!-- Aucun résultat -->
        <tr class="mat-row" *matNoDataRow>
          <td class="no-data-cell" [attr.colspan]="displayedColumns.length">
            <div class="empty-state" *ngIf="!loading">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#cbd5e1" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <p>Aucun utilisateur trouvé pour "{{ searchInput.value }}"</p>
              <button class="btn-reset" (click)="clearSearch(searchInput)">Réinitialiser la recherche</button>
            </div>
          </td>
        </tr>
      </table>
    </div>

    <!-- ===== FOOTER PAGINATION ===== -->
    <div class="table-footer">
      <span class="pagination-info">
        Affichage de
        <strong>{{ pageIndex * pageSize + 1 }}</strong>
        à
        <strong>{{ getEndIndex() }}</strong>
        sur
        <strong>{{ totalElements }}</strong>
      </span>

      <div class="pagination-nav">
        <button class="nav-arrow" (click)="prevPage()" [disabled]="isFirstPage()" title="Page précédente">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <button class="nav-arrow" (click)="nextPage()" [disabled]="isLastPage()" title="Page suivante">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>

  </div><!-- /table-card -->

  <!-- Hidden paginator for mat-table compatibility -->
  <mat-paginator [pageSize]="pageSize" [length]="totalElements" style="display:none"></mat-paginator>

</div>
